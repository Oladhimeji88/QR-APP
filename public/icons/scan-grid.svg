    <rect x="120" y="120" width="12" height="12" rx="3" fill="#3f7a63"/>
  </g>

  <!-- Radar overlay -->
  <g fill="none" stroke="#3f7a63">
    <circle cx="120" cy="120" r="46" stroke-opacity="0.22" stroke-width="2.5"/>
    <circle cx="120" cy="120" r="74" stroke-opacity="0.15" stroke-width="2.5"/>
    <circle cx="120" cy="120" r="102" stroke-opacity="0.10" stroke-width="2.5"/>
  </g>
  <path d="M120 120 L222 120 A102 102 0 0 0 185.6 42 Z" fill="url(#sg_sweep)" opacity="0.5"/>
  <path d="M120 120 L185.6 42" stroke="#3f7a63" stroke-width="3" stroke-linecap="round" stroke-opacity="0.85"/>
  <circle cx="120" cy="120" r="8" fill="#3f7a63" fill-opacity="0.18"/>
  <circle cx="120" cy="120" r="4" fill="#3f7a63"/>

  <!-- Scan line -->
  <rect x="20" y="118" width="200" height="4" rx="2" fill="url(#sg_scan)" opacity="0.7"/>

  <defs>
    <linearGradient id="sg_bg" x1="0" y1="0" x2="240" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f1f6f2"/>
    </linearGradient>
    <radialGradient id="sg_sweep" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(120 120) rotate(-25) scale(102)">
      <stop stop-color="#3f7a63" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#3f7a63" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sg_scan" x1="20" y1="120" x2="220" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3f7a63" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#3f7a63"/>
      <stop offset="1" stop-color="#3f7a63" stop-opacity="0"/>
    </linearGradient>
